[workspace]

[package]
name = "snemulator"
version = "0.1.0"
edition = "2021"

[dependencies]
args = "2.2.0"
getopts = "0.2.21"
libretro-rs = { path = "./libretro/libretro-rs" }
serde_json = "1.0.134"
rand="*"

[features]
warn-perf = []
no-video = []
no-audio = []
test-env = ["warn-perf", "no-video", "no-audio"]

debug-log-dmas = []

debug-log-ppu = []
debug-log-cpu = ["debug-log-dmas"]
debug-log-apu = []
debug-log-all = ["debug-log-ppu", "debug-log-cpu", "debug-log-apu"]

[profile.dev]
overflow-checks = false
opt-level = 2
debug = 2

[profile.release]
overflow-checks = false
opt-level = 3
lto = true

[lib]
crate-type = ["cdylib"]
